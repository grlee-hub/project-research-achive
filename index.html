<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Research Archive</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --text: #e8eaf0;
      --text-muted: #8b90a8;
      --border: #2e3248;
      --tag-paper: #1e3a5f;
      --tag-note: #1a3a2a;
      --tag-code: #3a2a1a;
      --tag-data: #2a1a3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    header { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border-bottom: 1px solid var(--border); padding: 2.5rem 2rem 2rem; }
    .header-inner { max-width: 900px; margin: 0 auto; }
    .header-inner h1 { font-size: 1.9rem; font-weight: 700; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
    .header-inner p { color: var(--text-muted); margin-top: 0.4rem; font-size: 0.95rem; }
    .filter-bar { max-width: 900px; margin: 1.8rem auto 0; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.35rem 1rem; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 0.85rem; cursor: pointer; transition: all 0.18s; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem 4rem; }
    .search-wrap { position: relative; margin-bottom: 1.8rem; }
    .search-wrap input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.18s; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; }
    .cards { display: flex; flex-direction: column; gap: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.4rem; transition: border-color 0.18s, transform 0.15s; cursor: default; }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .card-top { display: flex; align-items: flex-start; gap: 0.8rem; }
    .card-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 0.1rem; }
    .card-body { flex: 1; }
    .card-title { font-size: 1rem; font-weight: 600; color: var(--text); }
    .card-desc { font-size: 0.87rem; color: var(--text-muted); margin-top: 0.25rem; }
    .card-meta { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .tag { font-size: 0.75rem; padding: 0.18rem 0.65rem; border-radius: 999px; font-weight: 500; }
    .tag-paper { background: var(--tag-paper); color: #6ab0f5; }
    .tag-note  { background: var(--tag-note);  color: #6fcf97; }
    .tag-code  { background: var(--tag-code);  color: #f2994a; }
    .tag-data  { background: var(--tag-data);  color: #bb6bd9; }
    .card-date { font-size: 0.78rem; color: var(--text-muted); margin-left: auto; }
    .card-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.82rem; color: var(--accent); text-decoration: none; margin-top: 0.7rem; transition: opacity 0.15s; }
    .card-link:hover { opacity: 0.75; }
    .empty { text-align: center; padding: 4rem 0; color: var(--text-muted); }
    .empty .big { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat { font-size: 0.85rem; color: var(--text-muted); }
    .stat span { color: var(--text); font-weight: 600; }
    .section-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 1.5rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    footer { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.82rem; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>📂 Research Archive</h1>
    <p>아이디어, 방법론, 논문, 코드, 결과물을 한 곳에</p>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterCards('all')">All</button>
      <button class="filter-btn" onclick="filterCards('paper')">📄 Papers</button>
      <button class="filter-btn" onclick="filterCards('note')">📝 Notes</button>
      <button class="filter-btn" onclick="filterCards('code')">💻 Code</button>
      <button class="filter-btn" onclick="filterCards('data')">📊 Data</button>
    </div>
  </div>
</header>
<main>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="Search by title, tag, or description..." oninput="searchCards()"/>
  </div>
  <div class="stats" id="stats"></div>
  <div class="cards" id="cards"></div>
</main>
<footer>
  Last updated: <span id="last-updated"></span> &nbsp;&middot;&nbsp; GYURI's Research Archive
</footer>
<script>
  const items = [
    {
      type: "paper",
      icon: "📄",
      title: "Statistical seasonal prediction of Arctic sea ice concentration based on spatiotemporal anomaly persistent method",
      desc: "Gyu-Ri Lee, Sung-Ho Woo, Eun-Hyuk Baek, Joo-Hong Kim, Baek-Min Kim, Jee-Hoon Jeong · Environmental Research Letters, 19(11), 114060 (2024)",
      date: "2024-11-01",
      link: "https://scholar.google.com/citations?view_op=view_citation&hl=ko&user=oKNfES8AAAAJ&sortby=pubdate&citation_for_view=oKNfES8AAAAJ:DTjSuSUbmXsC",
      linkLabel: "Google Scholar",
      tags: ["Arctic sea ice", "seasonal prediction", "SEOF", "climate"]
    }
  ];
  let currentFilter = "all";
  function renderCards(data) {
    const c = document.getElementById("cards"); c.innerHTML = "";
    if (!data.length) { c.innerHTML = '<div class="empty"><div class="big">🔍</div>검색 결과가 없습니다.</div>'; return; }
    const g = {paper:[],note:[],code:[],data:[]};
    data.forEach(i => g[i.type] && g[i.type].push(i));
    const lb = {paper:"📄 Papers",note:"📝 Notes",code:"💻 Code",data:"📊 Data"};
    Object.keys(g).forEach(t => {
      if (!g[t].length) return;
      if (currentFilter==="all") { const l=document.createElement("div"); l.className="section-label"; l.textContent=lb[t]; c.appendChild(l); }
      g[t].forEach(item => {
        const d=document.createElement("div"); d.className="card"; d.dataset.type=item.type;
        d.innerHTML='<div class="card-top"><div class="card-icon">'+item.icon+'</div><div class="card-body"><div class="card-title">'+item.title+'</div><div class="card-desc">'+item.desc+'</div><div class="card-meta">'+item.tags.map(t=>'<span class="tag tag-'+item.type+'">#'+t+'</span>').join('')+'<span class="card-date">'+item.date+'</span></div>'+(item.link?'<a class="card-link" href="'+item.link+'" target="_blank">↗ '+item.linkLabel+'</a>':'')+'</div></div>';
        c.appendChild(d);
      });
    });
  }
  function updateStats(data) {
    const counts={paper:0,note:0,code:0,data:0}; data.forEach(i=>counts[i.type]++);
    document.getElementById("stats").innerHTML='<div class="stat">총 <span>'+data.length+'</span>개</div><div class="stat">📄 <span>'+counts.paper+'</span></div><div class="stat">📝 <span>'+counts.note+'</span></div><div class="stat">💻 <span>'+counts.code+'</span></div><div class="stat">📊 <span>'+counts.data+'</span></div>';
  }
  function getFiltered() {
    const q=document.getElementById("search").value.toLowerCase();
    return items.filter(i => (currentFilter==="all"||i.type===currentFilter) && (!q||i.title.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q)||i.tags.some(t=>t.toLowerCase().includes(q))));
  }
  function filterCards(type) {
    currentFilter=type;
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
    const f=getFiltered(); renderCards(f); updateStats(f);
  }
  function searchCards() { const f=getFiltered(); renderCards(f); updateStats(f); }
  document.getElementById("last-updated").textContent=new Date().toISOString().split("T")[0];
  renderCards(items); updateStats(items);
</script>
</body>
</html>
