<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Research Archive</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --text: #e8eaf0;
      --text-muted: #8b90a8;
      --border: #2e3248;
      --tag-paper: #1e3a5f;
      --tag-note: #1a3a2a;
      --tag-code: #3a2a1a;
      --tag-data: #2a1a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 2rem 2rem;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .header-inner h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header-inner p {
      color: var(--text-muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    /* ── Filter bar ── */
    .filter-bar {
      max-width: 900px;
      margin: 1.8rem auto 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.35rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Main ── */
    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 1.8rem;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.7rem 1rem 0.7rem 2.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.18s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap .icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* ── Cards ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      transition: border-color 0.18s, transform 0.15s;
      cursor: default;
    }

    /* ── Paper image strip ── */
    .paper-imgs {
      display: flex;
      gap: 0.45rem;
      margin-bottom: 0.9rem;
    }

    .paper-img-wrap {
      position: relative;
      width: 82px;
      height: 82px;
      flex-shrink: 0;
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface2);
    }

    .paper-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .lightbox-close {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .lightbox-close:hover { opacity: 1; }

    /* ── Data full-width image ── */
    .data-img {
      width: 100%;
      border-radius: 8px;
      margin-top: 0.9rem;
      display: block;
      cursor: zoom-in;
      border: 1px solid var(--border);
    }

    .paper-img-more {
      position: absolute;
      inset: 0;
      background: rgba(15, 17, 23, 0.62);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .card-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .card-body { flex: 1; }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .card-title:hover {
      color: var(--accent);
    }

    .card-desc {
      font-size: 0.87rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.75rem;
      padding: 0.18rem 0.65rem;
      border-radius: 999px;
      font-weight: 500;
    }

    .tag-paper  { background: var(--tag-paper);  color: #6ab0f5; }
    .tag-note   { background: var(--tag-note);   color: #6fcf97; }
    .tag-code   { background: var(--tag-code);   color: #f2994a; }
    .tag-data   { background: var(--tag-data);   color: #bb6bd9; }

    .card-date {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-left: auto;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      margin-top: 0.7rem;
      transition: opacity 0.15s;
    }

    .card-link:hover { opacity: 0.75; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-muted);
    }

    .empty .big { font-size: 2.5rem; margin-bottom: 0.5rem; }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .stat span {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Section divider ── */
    .section-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── More button ── */
    .card-more-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }
    .card-more-btn:hover { opacity: 0.75; }

    /* ── Detail Modal ── */
    .detail-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 999;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-y: auto;
    }
    .detail-modal.open { display: flex; }
    .detail-modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 680px;
      width: 100%;
      padding: 1.8rem;
      margin: auto;
    }
    .detail-modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }
    .detail-modal-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }
    .detail-modal-close {
      font-size: 1.8rem;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .detail-modal-close:hover { color: var(--text); }
    .dm-section { margin-bottom: 1.1rem; }
    .dm-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .dm-text {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.7;
    }
    .dm-imgs {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }
    .dm-img {
      flex: 1;
      min-width: 0;
      border-radius: 8px;
      display: block;
      border: 1px solid var(--border);
      cursor: zoom-in;
      width: 100%;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.82rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="">
</div>

<div class="detail-modal" id="detail-modal" onclick="closeDetailModal()">
  <div class="detail-modal-box" onclick="event.stopPropagation()">
    <div class="detail-modal-header">
      <span class="detail-modal-title" id="dm-title"></span>
      <span class="detail-modal-close" onclick="closeDetailModal()">&times;</span>
    </div>
    <div id="dm-body"></div>
  </div>
</div>

<header>
  <div class="header-inner">
    <h1>📂 Research Archive</h1>
    <p>아이디어, 방법론, 논문, 코드, 결과물을 한 곳에</p>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterCards('all')">All</button>
      <button class="filter-btn" onclick="filterCards('paper')">📄 Papers</button>
      <button class="filter-btn" onclick="filterCards('note')">📝 Notes</button>
      <button class="filter-btn" onclick="filterCards('code')">💻 Code</button>
      <button class="filter-btn" onclick="filterCards('data')">📊 Data</button>
    </div>
  </div>
</header>

<main>

  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="Search by title, tag, or description..." oninput="searchCards()"/>
  </div>

  <div class="stats" id="stats"></div>

  <div class="cards" id="cards"></div>

</main>

<footer>
  Last updated: <span id="last-updated"></span> &nbsp;·&nbsp; GYURI's Research Archive
</footer>

<script>
  let items = [];
  let currentFilter = "all";

  function parseCSV(text) {
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",");
    return lines.slice(1).map(line => {
      // CSV 필드 파싱 (따옴표 미사용 가정, 콤마 구분)
      const cols = line.split(",");
      const row = {};
      headers.forEach((h, i) => row[h.trim()] = (cols[i] || "").trim());

      const folder = row.folder;
      const figures = row.figures ? row.figures.split("|").map(f =>
        `papers/${folder}/figures/${f.trim()}`
      ) : [];

      return {
        type: "paper",
        icon: "📄",
        title: row.title,
        desc: `${row.authors} · ${row.journal} (${row.year})`,
        date: row.year,
        link: `https://doi.org/${row.doi}`,
        linkLabel: "DOI",
        tags: row.tags ? row.tags.split("|").map(t => t.trim()) : [],
        images: figures
      };
    });
  }

  function parseCSVLine(line) {
    const result = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        result.push(cur);
        cur = '';
      } else {
        cur += ch;
      }
    }
    result.push(cur);
    return result;
  }

  function parseDataCSV(text) {
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",").map(h => h.trim());
    return lines.slice(1).map(line => {
      const cols = parseCSVLine(line);
      const row = {};
      headers.forEach((h, i) => row[h] = (cols[i] || "").trim());

      const images = row.images ? row.images.split("|").map(f => f.trim()) : [];

      return {
        type: "data",
        icon: "📊",
        title: row.title,
        desc: row.desc,
        date: row.date,
        link: null,
        tags: row.tags ? row.tags.split("|").map(t => t.trim()) : [],
        images: images
      };
    });
  }

  Promise.all([
    fetch("papers/index.csv").then(r => r.text()),
    fetch("data/index.csv").then(r => r.text())
  ]).then(([papersText, dataText]) => {
    items = [...parseCSV(papersText), ...parseDataCSV(dataText)];
    renderCards(items);
    updateStats(items);
  });

  function renderCards(data) {
    const container = document.getElementById("cards");
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = `<div class="empty"><div class="big">🔍</div>검색 결과가 없습니다.</div>`;
      return;
    }

    const groups = { paper: [], note: [], code: [], data: [] };
    data.forEach(item => {
      if (groups[item.type]) groups[item.type].push(item);
    });

    const labels = { paper: "📄 Papers", note: "📝 Notes", code: "💻 Code", data: "📊 Data" };

    Object.keys(groups).forEach(type => {
      const group = groups[type];
      if (group.length === 0) return;

      if (currentFilter === "all") {
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = labels[type];
        container.appendChild(label);
      }

      group.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.type = item.type;

        // Build image strip for paper type
        const MAX_IMGS = 5;
        let imgStripHtml = "";
        if (item.type === "paper" && item.images && item.images.length > 0) {
          const imgs = item.images;
          const visible = imgs.slice(0, MAX_IMGS);
          const extra = imgs.length - MAX_IMGS;
          imgStripHtml = `<div class="paper-imgs">` +
            visible.map((src, idx) => {
              const isLast = idx === MAX_IMGS - 1 && extra > 0;
              return `<div class="paper-img-wrap">
                <img src="${src}" alt="figure ${idx + 1}" loading="lazy" onclick="openLightbox(event, '${src}')">
                ${isLast ? `<div class="paper-img-more">…</div>` : ""}
              </div>`;
            }).join("") +
          `</div>`;
        }

        // For data type: show overview only, add more button
        let cardDesc = item.desc;
        let moreBtnHtml = "";
        if (item.type === "data") {
          const sections = parseDescSections(item.desc);
          cardDesc = sections.overview || item.desc;
          const hasMore = sections.method || sections.results || (item.images && item.images.length > 0);
          if (hasMore) moreBtnHtml = `<button class="card-more-btn">더보기 ↓</button>`;
        }

        const titleHtml = item.link
          ? `<a class="card-title" href="${item.link}" target="_blank">${item.title}</a>`
          : `<span class="card-title">${item.title}</span>`;

        card.innerHTML = `
          ${imgStripHtml}
          <div class="card-top">
            <div class="card-icon">${item.icon}</div>
            <div class="card-body">
              ${titleHtml}
              <div class="card-desc">${cardDesc}</div>
              <div class="card-meta">
                ${item.tags.map(t => `<span class="tag tag-${item.type}">#${t}</span>`).join("")}
                <span class="card-date">${item.date}</span>
              </div>
              ${item.link ? `<a class="card-link" href="${item.link}" target="_blank">↗ ${item.linkLabel}</a>` : ""}
              ${moreBtnHtml}
            </div>
          </div>
        `;

        if (item.type === "data" && moreBtnHtml) {
          card.querySelector(".card-more-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            openDetailModal(item);
          });
        }

        container.appendChild(card);
      });
    });
  }

  function updateStats(data) {
    const counts = { paper: 0, note: 0, code: 0, data: 0 };
    data.forEach(i => counts[i.type]++);
    document.getElementById("stats").innerHTML = `
      <div class="stat">총 <span>${data.length}</span>개</div>
      <div class="stat">📄 <span>${counts.paper}</span></div>
      <div class="stat">📝 <span>${counts.note}</span></div>
      <div class="stat">💻 <span>${counts.code}</span></div>
      <div class="stat">📊 <span>${counts.data}</span></div>
    `;
  }

  function getFiltered() {
    const q = document.getElementById("search").value.toLowerCase();
    return items.filter(item => {
      const matchType = currentFilter === "all" || item.type === currentFilter;
      const matchSearch =
        !q ||
        item.title.toLowerCase().includes(q) ||
        item.desc.toLowerCase().includes(q) ||
        item.tags.some(t => t.toLowerCase().includes(q));
      return matchType && matchSearch;
    });
  }

  function filterCards(type) {
    currentFilter = type;
    document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
    const filtered = getFiltered();
    renderCards(filtered);
    updateStats(filtered);
  }

  function searchCards() {
    const filtered = getFiltered();
    renderCards(filtered);
    updateStats(filtered);
  }

  function parseDescSections(desc) {
    const mIdx = desc.indexOf('방법:');
    const rIdx = desc.indexOf('결과:');
    if (mIdx === -1 && rIdx === -1) return { overview: desc, method: null, results: null };
    const firstSpecial = mIdx > -1 ? mIdx : rIdx;
    const overview = desc.slice(0, firstSpecial).trim();
    const method = mIdx > -1 ? desc.slice(mIdx + 3, rIdx > -1 ? rIdx : desc.length).trim() : null;
    const results = rIdx > -1 ? desc.slice(rIdx + 3).trim() : null;
    return { overview, method, results };
  }

  function openDetailModal(item) {
    const s = parseDescSections(item.desc);
    document.getElementById('dm-title').textContent = item.title;
    let html = '';
    if (s.overview) html += `<div class="dm-section"><div class="dm-label">Overview</div><div class="dm-text">${s.overview}</div></div>`;
    if (s.method)   html += `<div class="dm-section"><div class="dm-label">Method</div><div class="dm-text">${s.method}</div></div>`;
    if (s.results)  html += `<div class="dm-section"><div class="dm-label">Results</div><div class="dm-text">${s.results}</div></div>`;
    if (item.images && item.images.length > 0) {
      html += `<div class="dm-imgs">` + item.images.map((src, i) =>
        `<img class="dm-img" src="${src}" alt="figure ${i+1}" loading="lazy" onclick="openLightbox(event,'${src}')">`
      ).join('') + `</div>`;
    }
    document.getElementById('dm-body').innerHTML = html;
    document.getElementById('detail-modal').classList.add('open');
  }

  function closeDetailModal() {
    document.getElementById('detail-modal').classList.remove('open');
  }

  function openLightbox(e, src) {
    e.stopPropagation();
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("open");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") { closeLightbox(); closeDetailModal(); }
  });

  // init
  document.getElementById("last-updated").textContent =
    new Date().toISOString().split("T")[0];
</script>

</body>
</html>
